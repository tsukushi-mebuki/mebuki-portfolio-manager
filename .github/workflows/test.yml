name: PHPUnit

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "chore/**"
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  phpunit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker stack
        run: docker compose up -d db wordpress

      - name: Install Composer dependencies (in Docker)
        run: docker compose run --rm composer "composer install --no-interaction --prefer-dist"

      - name: Ensure wordpress_test database exists
        run: docker compose exec -T db mysql -uroot -proot_password -e "CREATE DATABASE IF NOT EXISTS wordpress_test;"

      - name: Install WordPress test library (in Docker)
        run: |
          docker compose run --rm composer "curl -sSLo /tmp/install-wp-tests.sh https://raw.githubusercontent.com/wp-cli/scaffold-command/master/templates/install-wp-tests.sh && chmod +x /tmp/install-wp-tests.sh && /tmp/install-wp-tests.sh wordpress_test root root_password db latest true"

      - name: Run PHPUnit in WordPress container
        run: docker compose exec -T wordpress sh -lc "cd /var/www/html/wp-content/plugins/mebuki-portfolio-manager && WP_TESTS_DIR=/tmp/wordpress-tests-lib WP_TESTS_DB_HOST=db WP_TESTS_DB_NAME=wordpress_test WP_TESTS_DB_USER=root WP_TESTS_DB_PASSWORD=root_password vendor/bin/phpunit -c phpunit.xml.dist"

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color wordpress db

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v

  e2e-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mebuki-portfolio-manager/tests/e2e/package-lock.json

      - name: Install Playwright dependencies
        run: |
          cd mebuki-portfolio-manager/tests/e2e
          npm install
          npx playwright install --with-deps chromium

      - name: Start Docker stack
        run: docker compose up -d db wordpress

      - name: Wait for WordPress
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8000 > /dev/null; then
              echo "WordPress is ready"
              exit 0
            fi
            sleep 2
          done
          echo "WordPress did not become ready in time" >&2
          exit 1

      - name: Prepare WordPress data for E2E
        env:
          E2E_ADMIN_USER: admin
          E2E_ADMIN_PASSWORD: password
        run: |
          docker compose exec -T wordpress php /var/www/html/wp-content/plugins/mebuki-portfolio-manager/scripts/setup-wp-e2e.php

      - name: Run Playwright smoke
        env:
          E2E_BASE_URL: http://localhost:8000
          E2E_ADMIN_USER: admin
          E2E_ADMIN_PASSWORD: password
          E2E_FRONTEND_PATH: /portfolio-e2e/
          E2E_ADMIN_PATH: /wp-admin/admin.php?page=mebuki-pm
        run: |
          cd mebuki-portfolio-manager/tests/e2e
          npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            mebuki-portfolio-manager/tests/e2e/playwright-report
            mebuki-portfolio-manager/tests/e2e/test-results
          if-no-files-found: ignore

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color wordpress db

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v
