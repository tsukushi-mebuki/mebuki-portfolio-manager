name: PHPUnit

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "chore/**"
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  phpunit:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: ./mebuki-portfolio-manager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2, phpunit
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate MySQL connection
        run: |
          mysql --host=127.0.0.1 --port=3306 --user=root --password=root_password -e "SHOW DATABASES;"

      - name: Install WordPress test library
        run: |
          curl -sSLo /tmp/install-wp-tests.sh https://raw.githubusercontent.com/wp-cli/scaffold-command/master/templates/install-wp-tests.sh
          chmod +x /tmp/install-wp-tests.sh
          /tmp/install-wp-tests.sh wordpress_test root root_password 127.0.0.1 latest true

      - name: Run PHPUnit
        run: composer test

  e2e-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mebuki-portfolio-manager/tests/e2e/package-lock.json

      - name: Install Playwright dependencies
        run: |
          cd mebuki-portfolio-manager/tests/e2e
          npm install
          npx playwright install --with-deps chromium

      - name: Start Docker stack
        run: docker compose up -d db wordpress

      - name: Wait for WordPress
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:8000 > /dev/null; then
              echo "WordPress is ready"
              exit 0
            fi
            sleep 2
          done
          echo "WordPress did not become ready in time" >&2
          exit 1

      - name: Prepare WordPress data for E2E
        env:
          E2E_ADMIN_USER: admin
          E2E_ADMIN_PASSWORD: password
        run: |
          docker compose exec -T wordpress php /var/www/html/wp-content/plugins/mebuki-portfolio-manager/tests/e2e/scripts/setup-wp-e2e.php

      - name: Run Playwright smoke
        env:
          E2E_BASE_URL: http://localhost:8000
          E2E_ADMIN_USER: admin
          E2E_ADMIN_PASSWORD: password
          E2E_FRONTEND_PATH: /portfolio-e2e/
          E2E_ADMIN_PATH: /wp-admin/admin.php?page=mebuki-pm
        run: |
          cd mebuki-portfolio-manager/tests/e2e
          npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            mebuki-portfolio-manager/tests/e2e/playwright-report
            mebuki-portfolio-manager/tests/e2e/test-results
          if-no-files-found: ignore

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color wordpress db

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v
