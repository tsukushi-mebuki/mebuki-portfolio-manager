name: PHPUnit

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: ./mebuki-portfolio-manager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2, phpunit
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate MySQL connection
        run: |
          mysql --host=127.0.0.1 --port=3306 --user=root --password=root_password -e "SHOW DATABASES;"

      - name: Install WordPress test library
        run: |
          curl -sSLo /tmp/install-wp-tests.sh https://raw.githubusercontent.com/wp-cli/scaffold-command/master/templates/install-wp-tests.sh
          chmod +x /tmp/install-wp-tests.sh
          /tmp/install-wp-tests.sh wordpress_test root root_password 127.0.0.1 latest true

      - name: Create wp-tests-config.php
        run: |
          cat > /tmp/wordpress-tests-lib/wp-tests-config.php <<'PHP'
          <?php
          define( 'DB_NAME', 'wordpress_test' );
          define( 'DB_USER', 'root' );
          define( 'DB_PASSWORD', 'root_password' );
          define( 'DB_HOST', '127.0.0.1' );
          define( 'DB_CHARSET', 'utf8' );
          define( 'DB_COLLATE', '' );

          define( 'AUTH_KEY',         'testing' );
          define( 'SECURE_AUTH_KEY',  'testing' );
          define( 'LOGGED_IN_KEY',    'testing' );
          define( 'NONCE_KEY',        'testing' );
          define( 'AUTH_SALT',        'testing' );
          define( 'SECURE_AUTH_SALT', 'testing' );
          define( 'LOGGED_IN_SALT',   'testing' );
          define( 'NONCE_SALT',       'testing' );

          $table_prefix = 'wptests_';

          define( 'WP_TESTS_DOMAIN', 'example.org' );
          define( 'WP_TESTS_EMAIL', 'admin@example.org' );
          define( 'WP_TESTS_TITLE', 'Mebuki Test Site' );
          define( 'WP_PHP_BINARY', 'php' );
          PHP

      - name: Run PHPUnit
        run: composer test
