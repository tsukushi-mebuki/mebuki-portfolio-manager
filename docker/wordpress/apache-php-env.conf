# wp-config-docker.php は getenv('WORDPRESS_*') で DB を読む。
# mod_php ではコンテナ環境が PHP に届かず DB_HOST がデフォルトの mysql になると、
# CLI はインストール済み・HTTP は未インストール扱いになる（E2E の verify が失敗）。
#
# PassEnv: docker-compose の environment を Apache 起動時のプロセス環境から各リクエストへ渡す
#（SetEnv だけでは PHP の getenv() に乗らないビルドがある）。
# SetEnv: PassEnv が効かない場合のフォールバック（値は compose の wordpress.environment と一致させる）。
<IfModule mod_env.c>
  PassEnv WORDPRESS_DB_HOST
  PassEnv WORDPRESS_DB_NAME
  PassEnv WORDPRESS_DB_USER
  PassEnv WORDPRESS_DB_PASSWORD
</IfModule>
SetEnv WORDPRESS_DB_HOST "db:3306"
SetEnv WORDPRESS_DB_NAME "wordpress"
SetEnv WORDPRESS_DB_USER "wordpress"
SetEnv WORDPRESS_DB_PASSWORD "wordpress"
